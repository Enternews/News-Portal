<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Enter News Media | Pop Culture &amp; Entertainment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Serif', serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

<header class="bg-black text-white py-6 border-b-4 border-red-600">
  <div class="max-w-6xl mx-auto px-4 flex flex-col items-center">
    <div class="text-center">
        <h1 class="text-4xl font-extrabold tracking-widest uppercase">
          <a class="hover:text-red-500 transition" href="index.html">Enter News Media</a>
        </h1>
        <p class="text-sm mt-2 text-gray-400 tracking-wide">Denver's Premier Source for Tech &amp; World</p>
    </div>
    
    <nav class="mt-6 flex space-x-6 text-sm font-bold tracking-wider uppercase text-gray-300">
        <a href="index.html" class="hover:text-white hover:text-red-500 transition">Home</a>
        <a href="about.html" class="hover:text-white hover:text-red-500 transition">About Us</a>
        <a href="support.html" class="hover:text-white hover:text-red-500 transition">Support</a>
    </nav>
  </div>
</header>


<main class="max-w-6xl mx-auto px-4 py-8" id="app-container">
  <div class="text-center py-20 font-bold tracking-widest text-gray-500">
    MEMUAT BERITA...
  </div>
</main>


<footer class="bg-black text-white text-center py-8 mt-12 border-t-2 border-gray-800">
  <div class="flex justify-center items-center space-x-4 mb-4 text-sm font-bold flex-wrap gap-y-2">
    <a href="https://x.com/Enternews_meida" target="_blank" class="text-gray-400 hover:text-white transition">X: @Enternews_meida</a>
    <span class="text-gray-600">|</span>
    <a href="https://reddit.com/user/enternews_media" target="_blank" class="text-gray-400 hover:text-white transition">Reddit: u/enternews_media</a>
    <span class="text-gray-600">|</span>
    <a href="mailto:enternews.media@outlook.com" class="text-gray-400 hover:text-white transition">Email: enternews.media@outlook.com</a>
  </div>
  <p class="text-gray-400 text-xs">&copy; 2026 Enter News Media Group.</p>
</footer>

<script>
  // Otak JavaScript (Tablet Pintar)
  const ITEMS_PER_PAGE = 10;
  let currentPage = 1;
  let dbPublik = [];

  async function muatDatabase() {
    try {
      // Mengambil Buku Induk
      const response = await fetch('database_berita.json?v=' + new Date().getTime());
      const semuaBerita = await response.json();
      
      // Menyembunyikan berita 2 wajah (predator)
      dbPublik = semuaBerita.filter(art => art.type !== 'predator');
      
      renderHalaman(currentPage);
    } catch (error) {
      document.getElementById('app-container').innerHTML = '<p class="text-center text-red-600 py-10">Gagal memuat berita.</p>';
    }
  }

  function renderHalaman(halaman) {
    currentPage = halaman;
    const startIndex = (halaman - 1) * ITEMS_PER_PAGE;
    const endIndex = startIndex + ITEMS_PER_PAGE;
    const artikelHalamanIni = dbPublik.slice(startIndex, endIndex);
    const totalHalaman = Math.ceil(dbPublik.length / ITEMS_PER_PAGE);

    let htmlKonten = '';

    // Hero Artikel (Hanya di Halaman 1)
    if (halaman === 1 && artikelHalamanIni.length > 0) {
      const hero = artikelHalamanIni[0];
      htmlKonten += `
        <a class="block mb-12 group" href="${hero.link}">
          <div class="bg-gray-300 h-96 w-full bg-cover bg-center rounded-lg shadow-md"
               style="background-image: url('${hero.foto}');"></div>
          <h2 class="text-4xl font-bold mt-4 group-hover:text-red-600 transition duration-300">${hero.judul}</h2>
          <p class="text-gray-600 mt-2 text-xl">${hero.snippet}</p>
        </a>`;
    }

    // Grid Artikel
    let indexMulaiGrid = (halaman === 1) ? 1 : 0;
    for (let i = indexMulaiGrid; i < artikelHalamanIni.length; i += 3) {
      const chunk = artikelHalamanIni.slice(i, i + 3);
      htmlKonten += `
        <div class="w-full bg-gray-200 border-2 border-dashed border-gray-400 text-center py-10 mb-12 text-gray-500 font-bold tracking-widest uppercase text-xs">
          [ Sponsored Advertisement Slot ]
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">`;
      
      chunk.forEach(art => {
        htmlKonten += `
          <article class="group">
            <a class="block" href="${art.link}">
              <img alt="Thumbnail" class="w-full h-48 object-cover mb-4 rounded-lg shadow-sm" src="${art.foto}"/>
              <h3 class="font-bold text-2xl mb-2 group-hover:text-red-600 transition">${art.judul}</h3>
              <p class="text-gray-600 text-sm">${art.snippet}</p>
            </a>
          </article>`;
      });
      htmlKonten += `</div>`;
    }

    // Navigasi Pagination
    htmlKonten += `<nav class="flex justify-center items-center space-x-4 mt-8 flex-wrap gap-y-2">`;
    
    if (halaman > 1) {
      htmlKonten += `<button onclick="renderHalaman(${halaman - 1})" class="px-4 py-2 bg-gray-200 hover:bg-black hover:text-white transition rounded font-bold shadow">« Prev</button>`;
    }

    let startPage = Math.max(1, halaman - 4);
    let endPage = Math.min(totalHalaman, startPage + 9);
    if (endPage - startPage < 9) {
      startPage = Math.max(1, endPage - 9);
    }

    for (let p = startPage; p <= endPage; p++) {
      if (p === halaman) {
        htmlKonten += `<span class="px-4 py-2 bg-red-600 text-white font-bold rounded shadow">${p}</span>`;
      } else {
        htmlKonten += `<button onclick="renderHalaman(${p})" class="px-4 py-2 bg-gray-200 hover:bg-black hover:text-white transition rounded font-bold shadow">${p}</button>`;
      }
    }

    if (halaman < totalHalaman) {
      htmlKonten += `<button onclick="renderHalaman(${halaman + 1})" class="px-4 py-2 bg-gray-200 hover:bg-black hover:text-white transition rounded font-bold shadow">Next »</button>`;
    }
    htmlKonten += `</nav>`;

    // Tampilkan ke layar
    document.getElementById('app-container').innerHTML = htmlKonten;
    window.scrollTo(0, 0); // Kembali ke atas saat pindah halaman
  }

  // Jalankan saat halaman dibuka
  muatDatabase();
</script>
</body>
</html>
